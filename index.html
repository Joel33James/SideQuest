<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Side Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: rgba(255,255,255,0.06);
    --t1: #e6edf3; --t2: #7d8590; --t3: #444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--t1); font-family: 'IBM Plex Sans', -apple-system, sans-serif; min-height: 100vh; padding: 16px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font: 700 24px/1.2 'Space Mono', monospace; }
  header p { font-size: 13px; color: var(--t2); margin-top: 4px; }
  .controls { margin-top: 12px; display: flex; justify-content: center; align-items: center; gap: 10px; }
  .btn { padding: 7px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: var(--t1); font: 600 13px 'IBM Plex Sans', sans-serif; cursor: pointer; transition: .2s; }
  .btn:disabled { opacity: 0.7; cursor: wait; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn:hover { background: rgba(255,255,255,0.08); }
  .btn:disabled { color: #555; cursor: not-allowed; }
  .timestamp { font: 11px 'JetBrains Mono', monospace; color: var(--t3); }

  .profile { background: var(--card); border-radius: 14px; padding: 18px 16px; margin-bottom: 14px; border: 1px solid var(--border); }
  .profile.has-alerts { border-color: var(--profile-accent, #4da8da)33; }
  .profile-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .profile-emoji { font-size: 26px; }
  .profile-info { flex: 1; }
  .profile-info h2 { font: 700 16px 'Space Mono', monospace; color: var(--t1); }
  .profile-info p { font-size: 11px; color: var(--t2); margin-top: 2px; }
  .profile-best { text-align: center; }
  .profile-best .label { font: 9px 'JetBrains Mono', monospace; color: var(--t3); letter-spacing: 1px; margin-top: 1px; }

  .loc { border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; transition: .2s; border: 1px solid var(--border); background: rgba(255,255,255,0.02); }
  .loc.top { border-color: var(--grade-color, #555)33; }
  .loc-row { display: flex; align-items: center; gap: 8px; }
  .loc-rank { font: 700 12px 'JetBrains Mono', monospace; width: 20px; text-align: center; flex-shrink: 0; }
  .loc-info { flex: 1; min-width: 0; }
  .loc-name { font-weight: 600; font-size: 13px; }
  .loc-meta { font-size: 11px; color: var(--t2); }
  .loc-links { display: flex; gap: 4px; flex-shrink: 0; }
  .loc-links a { font-size: 10px; padding: 3px 7px; border-radius: 4px; text-decoration: none; font-weight: 600; border: 1px solid; background: rgba(255,255,255,0.06); white-space: nowrap; }
  .loc-expand { font-size: 13px; color: #555; flex-shrink: 0; transition: transform .2s; }
  .loc-expand.open { transform: rotate(180deg); }

  .criteria { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: none; }
  .criteria.open { display: block; }
  .crit-row { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 5px; }
  .crit-label { width: 120px; color: var(--t2); flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .crit-bar-bg { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .crit-bar { height: 100%; border-radius: 3px; transition: width .6s ease-out; }
  .crit-val { width: 36px; text-align: right; font: 11px 'JetBrains Mono', monospace; color: var(--t2); }
  .crit-req { width: 14px; text-align: center; font-size: 10px; }

  .status-box { text-align: center; padding: 36px; color: var(--t2); }
  .status-box .icon { font-size: 28px; margin-bottom: 10px; }
  .status-box .msg { font-size: 13px; font-weight: 500; }
  .status-box .sub { font-size: 11px; color: var(--t3); margin-top: 4px; }
  .error-box { padding: 16px; background: rgba(232,93,74,0.08); border-radius: 10px; border: 1px solid rgba(232,93,74,0.2); margin-bottom: 14px; }
  .error-box h3 { color: #e85d4a; font-size: 13px; margin-bottom: 4px; }
  .error-box p { color: var(--t2); font-size: 11px; word-break: break-word; line-height: 1.4; }
  .error-box button { margin-top: 8px; padding: 5px 12px; border-radius: 5px; border: 1px solid rgba(232,93,74,0.3); background: rgba(232,93,74,0.1); color: #e85d4a; font-size: 11px; cursor: pointer; font-weight: 600; }

  footer { text-align: center; padding: 12px 0 6px; font-size: 10px; color: #333; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp .4s ease-out; }

  svg.ring text { fill: var(--t1); }

  /* ── Scoring criteria popover ──────────────────────── */
  .si-wrap { position: relative; margin-top: 5px; text-align: center; }
  .si-btn { font-size: 10px; color: var(--t2); cursor: pointer; text-decoration: underline dotted; text-underline-offset: 2px; white-space: nowrap; background: none; border: none; padding: 0; font-family: inherit; }
  .si-btn:hover { color: var(--t1); }
  .si-pop {
    display: none; position: absolute; right: 0; top: calc(100% + 6px);
    background: #1c2128; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; padding: 13px 14px; width: 290px; z-index: 150;
    box-shadow: 0 8px 28px rgba(0,0,0,.5); text-align: left;
  }
  .si-wrap:hover .si-pop, .si-wrap.open .si-pop { display: block; }
  .si-head { font: 700 9px 'JetBrains Mono', monospace; color: var(--t3); letter-spacing: 1.2px; margin-bottom: 9px; }
  .si-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 6px; }
  .si-dot { font-size: 9px; flex-shrink: 0; margin-top: 1px; }
  .si-info { flex: 1; min-width: 0; }
  .si-label { font-size: 12px; font-weight: 600; color: var(--t1); }
  .si-rationale { font-size: 10px; color: var(--t2); line-height: 1.45; margin-top: 2px; }
  .si-meta { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--t3); margin-top: 2px; }
  .si-divider { height: 1px; background: var(--border); margin: 9px 0; }
  .si-footer { font-size: 10px; color: var(--t3); }

  /* ── 5-day table view (Corn Harvest) ───────────────── */
  .ct-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 4px; }
  .ct { width: 100%; border-collapse: separate; border-spacing: 0; }
  .ct thead th { padding-bottom: 8px; }
  .ct-loc-head { font: 9px 'JetBrains Mono', monospace; color: var(--t3); text-align: left; letter-spacing: 1px; padding-right: 10px; }
  .ct-day-head { font: 9px 'JetBrains Mono', monospace; color: var(--t2); text-align: center; letter-spacing: .5px; min-width: 76px; line-height: 1.5; }
  .ct-loc-cell { font-size: 12px; font-weight: 600; color: var(--t1); padding: 3px 10px 3px 0; white-space: nowrap; vertical-align: middle; position: relative; }
  .ct-loc-name { display: inline-block; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; }
  .ct-score-cell { text-align: center; padding: 3px 3px; vertical-align: middle; }
  .ct-pill {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 7px; padding: 5px 4px; min-width: 68px; height: 30px;
    font: 600 11px 'JetBrains Mono', monospace;
    cursor: pointer; transition: filter .15s; white-space: nowrap; border: 1px solid transparent;
  }
  .ct-pill:hover { filter: brightness(1.3); }
  .ct-pill.grade-EXCEPTIONAL { background: rgba(240,180,41,0.18); color: #f0b429; border-color: rgba(240,180,41,0.25); }
  .ct-pill.grade-GOOD        { background: rgba(56,183,100,0.18); color: #38b764; border-color: rgba(56,183,100,0.25); }
  .ct-pill.grade-MARGINAL    { background: rgba(232,168,56,0.15); color: #e8a838; border-color: rgba(232,168,56,0.2); }
  .ct-pill.grade-FAIL        { background: rgba(255,255,255,0.03); color: #555; border-color: rgba(255,255,255,0.05); }
  .ct-pill.grade-NONE        { background: transparent; color: var(--t3); }

  /* ── Day detail modal ───────────────────────────────── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn .15s ease-out;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .modal-box {
    background: #1c2128; border-radius: 14px; padding: 18px 16px;
    max-width: 360px; width: calc(100% - 32px);
    border: 1px solid rgba(255,255,255,0.1);
    animation: slideUp .2s ease-out;
  }
  @keyframes slideUp { from { transform:translateY(10px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  .modal-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .modal-info { flex: 1; min-width: 0; }
  .modal-loc  { font: 700 13px 'Space Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .modal-date { font-size: 11px; color: var(--t2); margin-top: 3px; }
  .modal-close { background: none; border: none; color: var(--t2); font-size: 22px; cursor: pointer; line-height: 1; padding: 0 0 0 6px; flex-shrink: 0; }
  .modal-close:hover { color: var(--t1); }
</style>
</head>
<body>
<div id="modalArea"></div>
<div class="wrap">
  <header>
    <h1>🏔 Side Quest</h1>
    <p>Your adventure scout that finds the ideal conditions, and rates them for you so you can stay focused on the rest of life.</p>
    <div class="controls">
      <button class="btn" id="refreshBtn" onclick="runScout({force:true})">↻ Force refresh</button>
      <span class="timestamp" id="lastRun"></span>
    </div>
  </header>
  <div id="statusArea"></div>
  <div id="resultsArea"></div>
  <footer id="footerEl" style="display:none">
    Data from NOAA/NWS api.weather.gov · Moon math via SunCalc · Click rows to expand criteria
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"></script>
<script>
// ── Profile Definitions ──────────────────────────────────────────────────────
const PROFILES = [
  {
    name: "Corn Harvest", emoji: "🌽", accent: "#e8a838", tableView: true,
    description: "Backcountry corn snow — freeze-thaw perfection on WA ski tours over 7k ft",
    locations: [
      { name: "Mt. Ruth (Hannegan Pass)",        lat: 48.9162, lon: -121.6080, elevation: 7106  },
      { name: "Mt. Shuksan (Sulphide Glacier)",  lat: 48.8210, lon: -121.6010, elevation: 9131  },
      { name: "Mt. Baker (Squak Glacier)",       lat: 48.7200, lon: -121.8150, elevation: 8800  },
      { name: "Isolation Traverse",              lat: 48.6890, lon: -121.1390, elevation: 8720  },
      { name: "Black Peak",                      lat: 48.5175, lon: -120.6790, elevation: 8970  },
      { name: "Sahale Peak",                     lat: 48.4980, lon: -121.0640, elevation: 8680  },
      { name: "Bonanza Peak",                    lat: 48.1570, lon: -120.9070, elevation: 9511  },
      { name: "Glacier Peak",                    lat: 48.1270, lon: -121.1790, elevation: 10525 },
      { name: "Chiwawa Mountain",                lat: 48.1250, lon: -120.8760, elevation: 8459  },
      { name: "Spider Gap",                      lat: 48.0530, lon: -120.9210, elevation: 7100  },
      { name: "Royal Basin (Olympic)",           lat: 47.8810, lon: -123.1270, elevation: 5800  },
      { name: "Mt. Stuart",                      lat: 47.4600, lon: -120.8940, elevation: 9415  },
      { name: "Mt. Daniel",                      lat: 47.4274, lon: -121.0269, elevation: 7960  },
      { name: "Steamboat Prow (Inter Glacier)",  lat: 46.9300, lon: -121.6570, elevation: 9700  },
      { name: "Mt. Rainier (Muir Snowfield)",    lat: 46.8030, lon: -121.7370, elevation: 14411 },
      { name: "Mt. Adams (SW Chutes)",           lat: 46.1860, lon: -121.4920, elevation: 12281 },
      { name: "Mt. St. Helens",                  lat: 46.1840, lon: -122.1970, elevation: 8365  },
    ],
    criteria: [
      { field: "overnight_low_f",            label: "Overnight freeze",               op: "<=", threshold: 40, required: true,  weight: 30, ideal: 20, curve: "linear", failLabel: "Too warm overnight",  rationale: "Any overnight low below 40°F counts — but colder is much better. Below 28°F locks in a hard corn layer; 40°F gives just a surface skin. Above 40°F the snowpack won't refreeze." },
      { field: "temperature_f",              label: "Warm enough to soften",          op: ">=", threshold: 36, required: true,  weight: 25, ideal: 45, curve: "linear", failLabel: "Too cold to soften",  rationale: "The daily high needs to climb above 36°F to start softening the frozen surface. 45°F is the sweet spot — warm enough for smooth corn without turning it to slush." },
      { field: "cloud_cover_pct",            label: "Sunny (solar heat drives corn)", op: "<=", threshold: 25, required: true,  weight: 25, ideal: 5,  curve: "linear", failLabel: "Too cloudy",           rationale: "Direct solar radiation is what actually softens the top layer — air temperature alone isn't enough. Clear skies (≤25%) are required; full sun (≤5%) is ideal." },
      { field: "wind_speed_mph",             label: "Low wind",                       op: "<=", threshold: 15, required: false, weight: 10, ideal: 3,  curve: "linear",                                   rationale: "Wind can crust over or destroy the delicate corn surface. Not a hard requirement — sheltered terrain exists — but calm conditions score much higher." },
      { field: "precipitation_probability_pct", label: "No new precipitation",        op: "<=", threshold: 10, required: false, weight: 10, ideal: 0,  curve: "step",                                    rationale: "New snow or rain ruins the corn cycle. Fresh snow covers the layer; rain makes ice. Must be dry — step scoring means either it's dry or it isn't." },
    ],
    scoring: { pass: 60, highlight: 85 },
  },
  {
    name: "Nightsky Backpacking", emoji: "🌌", accent: "#7b68ee", tableView: true,
    description: "Clear dark skies for stargazing overnights",
    locations: [
      { name: "Chain Lakes (Mt. Baker)",        lat: 48.8280, lon: -121.6890, elevation: 4300 },
      { name: "North Cascades",                 lat: 48.4748, lon: -121.0750, elevation: 5400 },
      { name: "Seven Lakes Basin (Olympic)",    lat: 47.9420, lon: -123.6990, elevation: 4200 },
      { name: "Enchantments",                   lat: 47.5282, lon: -120.8253, elevation: 4400 },
      { name: "Mt. Rainier Sunrise",            lat: 46.9145, lon: -121.6415, elevation: 6400 },
      { name: "Goat Rocks",                     lat: 46.4675, lon: -121.5025, elevation: 5600 },
    ],
    criteria: [
      { field: "cloud_cover_pct",               label: "Clear sky for stargazing",    op: "<=",      threshold: 15,            required: true,  weight: 30, ideal: 0,  curve: "linear", failLabel: "Clouds too dense",     rationale: "Even thin cloud layers wash out the Milky Way and dim faint stars. ≤15% is the hard cutoff; perfectly clear (0%) gives the darkest skies." },
      { field: "moon_light_pct",                label: "Dark moon window",            op: "<=",      threshold: 50,            required: true,  weight: 25, ideal: 0,  curve: "linear", failLabel: "Moon too bright",      rationale: "Samples the moon every 15 minutes through astronomical night (sun ≥18° below horizon) and multiplies three things at each step: (1) moon illumination fraction from SunCalc — 0 at new moon, 1 at full — (2) whether the moon is above the local horizon for your lat/lon, and (3) a time-of-night weight shaped like a bathtub curve — samples right after nightfall and just before sunrise count 2.5× more than deep-midnight samples. That last factor penalizes a 'perfect window' that only happens at 1:30am versus one right after nightfall or close to sunrise. New moon, or moon that sets before dark = 0 (ideal). Full moon up through the prime early-evening hours = fails with 'Moon too bright'. Partial phases, or full moons confined to deep-night hours only, pass with a reduced score." },
      { field: "humidity_pct",                  label: "Low humidity",                op: "<=",      threshold: 55,            required: false, weight: 15, ideal: 25, curve: "linear",                                    rationale: "High humidity scatters and absorbs light, reducing transparency and contrast. Dry air (≤25%) produces the sharpest, most defined starfields." },
      { field: "precipitation_probability_pct", label: "Dry conditions",              op: "<=",      threshold: 15,            required: true,  weight: 15, ideal: 0,  curve: "linear", failLabel: "Rain expected",        rationale: "Any chance of rain above 15% is too risky for an overnight trip planned around clear skies." },
      { field: "wind_speed_mph",                label: "Calm wind at camp",           op: "<=",      threshold: 15,            required: false, weight: 7,  ideal: 3,  curve: "linear",                                    rationale: "Wind doesn't affect sky clarity, but sustained wind makes stargazing miserable and can disturb optics. Calm nights score much higher." },
      { field: "overnight_low_f",               label: "Comfortable overnight temp",  op: "between", threshold: 30, upper: 60, required: false, weight: 8,  ideal: 42, curve: "bell",                                     rationale: "Too cold and you're huddled in your bag; too warm and bugs ruin the night. 42°F is the sweet spot — cool enough for clear skies, warm enough to stay out." },
    ],
    scoring: { pass: 55, highlight: 80 },
  },
  {
    name: "Sunset Sunrise Backpacking", emoji: "🌅", accent: "#e85d4a", tableView: true,
    description: "Dramatic golden hour light for ridge camps",
    locations: [
      { name: "Sahale Arm",            lat: 48.4830, lon: -121.0530, elevation: 7600 },
      { name: "Enchantments Aasgard",  lat: 47.5150, lon: -120.8100, elevation: 7800 },
      { name: "Spray Park",            lat: 46.9200, lon: -121.8050, elevation: 5800 },
      { name: "Goat Rocks Old Snowy",  lat: 46.4580, lon: -121.4420, elevation: 7000 },
    ],
    criteria: [
      { field: "cloud_cover_pct",               label: "Cloud texture for dramatic light", op: "between", threshold: 15, upper: 65, required: false, weight: 30, ideal: 38, curve: "bell",                                 rationale: "Perfectly clear skies produce bland sunsets. The best alpenglow happens with 20–50% cloud cover — enough texture to light up without blocking the sun entirely. Bell curve peaks at 38%." },
      { field: "precipitation_probability_pct", label: "Dry conditions",                   op: "<=",      threshold: 20,            required: true,  weight: 20, ideal: 5,  curve: "linear", failLabel: "Rain expected",   rationale: "Rain ruins the camp and often means a solid overcast — no color. ≤20% keeps the risk low; ≤5% is nearly guaranteed dry." },
      { field: "visibility_mi",                 label: "Long-range visibility",            op: ">=",      threshold: 8,             required: false, weight: 20, ideal: 30, curve: "linear",                               rationale: "Ridge camps are worthless if you can't see the peaks. ≥8 mi is the minimum for a view; ≥30 mi gives that crystal-clear 100-mile panorama." },
      { field: "wind_speed_mph",                label: "Calm enough for camp",             op: "<=",      threshold: 20,            required: false, weight: 10, ideal: 5,  curve: "linear",                               rationale: "Exposed ridge camps become miserable above 20 mph. Lower wind also means clouds hold their shape longer during golden hour instead of streaking past." },
      { field: "temperature_f",                 label: "Comfortable temperature",          op: "between", threshold: 40, upper: 75, required: false, weight: 10, ideal: 55, curve: "bell",                                 rationale: "55°F at sunset is perfect — comfortable in a light layer, no condensation issues, and stable air for crisp photos. Below 40°F or above 75°F reduces enjoyment." },
      { field: "humidity_pct",                  label: "Clean light (low humidity)",       op: "<=",      threshold: 65,            required: false, weight: 10, ideal: 35, curve: "linear",                               rationale: "Low humidity means clean, saturated colors at golden hour. High humidity scatters light into a flat haze that washes out the alpenglow." },
    ],
    scoring: { pass: 50, highlight: 80 },
  },
  {
    name: "Bluebird Powder Day", emoji: "🏔", accent: "#4da8da", tableView: true,
    description: "Fresh powder + clear skies on WA ski mountains",
    locations: [
      { name: "Mt. Baker",        lat: 48.8566, lon: -121.6644, elevation: 5089 },
      { name: "Stevens Pass",     lat: 47.7448, lon: -121.0890, elevation: 4061 },
      { name: "Snoqualmie Pass",  lat: 47.4281, lon: -121.4138, elevation: 3022 },
      { name: "Crystal Mountain", lat: 46.9354, lon: -121.5045, elevation: 6872 },
    ],
    criteria: [
      { field: "overnight_snowfall_in",     label: "Fresh snow overnight",  op: ">=", threshold: 8,  required: true,  weight: 40, ideal: 18, curve: "linear", failLabel: "No fresh snow",         rationale: "This is the whole game — 8\" is the minimum for a powder day worth the drive, 18\"+ is a true dump. The highest weight of any criterion by far." },
      { field: "cloud_cover_pct",           label: "Clear skies",           op: "<=", threshold: 20, required: true,  weight: 20, ideal: 0,  curve: "linear", failLabel: "Too cloudy",             rationale: "Bluebird means sun on fresh snow. Overcast days with powder exist but don't score here — this profile is specifically for the classic sunny pow day." },
      { field: "overnight_low_f",           label: "Cold overnight",        op: "<=", threshold: 26, required: true,  weight: 15, ideal: 15, curve: "linear", failLabel: "Didn't freeze overnight", rationale: "Cold nights keep the snow light and dry. Above 26°F the snowpack can consolidate or develop a crust overnight, ruining the morning's powder." },
      { field: "temperature_f",             label: "Cold for powder",       op: "<=", threshold: 32, required: true,  weight: 15, ideal: 22, curve: "linear", failLabel: "Too warm for powder",    rationale: "Warm daytime temps turn powder into heavy cement quickly. ≤32°F keeps the snow light all day; 22°F or colder means it stays dry for hours." },
      { field: "wind_speed_mph",            label: "Manageable wind",       op: "<=", threshold: 25, required: false, weight: 10, ideal: 5,  curve: "linear",                                      rationale: "High wind on exposed ridges creates dangerous wind slab and scours powder into gullies. Under 25 mph is workable; under 5 mph is dreamy." },
    ],
    scoring: { pass: 60, highlight: 85 },
  },
  {
    name: "Deep Dry Pow Day", emoji: "❄️", accent: "#a0c4ff", tableView: true,
    description: "Maximum snowfall depth + cold dry snow on WA ski mountains — clouds don't matter",
    locations: [
      { name: "Mt. Baker",        lat: 48.8566, lon: -121.6644, elevation: 5089 },
      { name: "Stevens Pass",     lat: 47.7448, lon: -121.0890, elevation: 4061 },
      { name: "Snoqualmie Pass",  lat: 47.4281, lon: -121.4138, elevation: 3022 },
      { name: "Crystal Mountain", lat: 46.9354, lon: -121.5045, elevation: 6872 },
    ],
    criteria: [
      { field: "overnight_snowfall_in", label: "Deep overnight snowfall",   op: ">=", threshold: 8,  required: true,  weight: 40, ideal: 30, curve: "linear", failLabel: "Not enough snow",       rationale: "More snow is always better here — 8\" is the floor, 30\"+ is a legendary dump. Unlike bluebird days there's no ceiling; the deeper the better, full linear scoring all the way up." },
      { field: "overnight_low_f",       label: "Cold enough for dry snow",  op: "<=", threshold: 28, required: true,  weight: 25, ideal: 10, curve: "linear", failLabel: "Too warm — heavy snow", rationale: "Snow crystal structure depends heavily on temperature. Below 25°F produces ultralight 'champagne' powder with low water content — the kind that floats. 28°F is the cutoff; above that the flakes bond into heavier, wetter snow that skis like concrete. 10°F or colder is the dream." },
      { field: "wind_speed_mph",        label: "Low wind (ski day)",        op: "<=", threshold: 25, required: false, weight: 20, ideal: 3,  curve: "linear",                                    rationale: "High wind on powder days scours the snow off exposed terrain into gullies and builds dangerous wind slabs on leeward aspects. Under 25 mph is manageable; under 3 mph means pristine untracked snow everywhere on the mountain." },
      { field: "wind_gust_mph",         label: "Low gusts (storm quality)", op: "<=", threshold: 40, required: false, weight: 15, ideal: 5,  curve: "linear",                                    rationale: "High gusts during the storm itself create wind-deposited slab instead of cohesionless dry pow. Even if the morning looks calm, a high-gust storm overnight means the snowpack is layered and uneven rather than uniform deep powder." },
    ],
    scoring: { pass: 55, highlight: 85 },
  },
];

// ── Scoring Engine ───────────────────────────────────────────────────────────
function passesThreshold(v, op, t, u) {
  if (op === "<=") return v <= t;
  if (op === ">=") return v >= t;
  if (op === "between") return v >= t && v <= (u ?? t);
  return false;
}

function scoreLinear(v, t, ideal, op) {
  if (ideal === t) return passesThreshold(v, op, t) ? 1 : 0;
  if (op === "<=" || op === "<") { if (v > t) return 0; if (v <= ideal) return 1; return (t - v) / (t - ideal); }
  if (op === ">=" || op === ">") { if (v < t) return 0; if (v >= ideal) return 1; return (v - t) / (ideal - t); }
  return passesThreshold(v, op, t) ? 1 : 0;
}

function scoreBell(v, t, ideal) {
  if (ideal == null) return 0;
  const w = Math.abs(t - ideal) || 10;
  return Math.max(0, Math.min(1, Math.exp(-Math.pow(Math.abs(v - ideal), 2) / (2 * Math.pow(w / 2, 2)))));
}

function scoreCriterion(c, weather) {
  const v = weather[c.field];
  // null means NWS didn't provide this field — "no data", not a failed condition
  if (v == null) return { ...c, actual: null, noData: true, passed: false, rawScore: 0, weighted: 0 };
  const passed = passesThreshold(v, c.op, c.threshold, c.upper);
  let raw = 0;
  if (passed) {
    const ideal = c.ideal ?? c.threshold;
    if (c.curve === "bell") raw = scoreBell(v, c.threshold, ideal);
    else if (c.curve === "step") raw = 1;
    else raw = scoreLinear(v, c.threshold, ideal, c.op);
  }
  return { ...c, actual: v, noData: false, passed, rawScore: raw, weighted: raw * c.weight };
}

function scoreLocation(profile, weather) {
  const results = profile.criteria.map(c => scoreCriterion(c, weather));
  // Only count a required criterion as a hard failure if we actually have data showing it failed.
  // Missing data (noData) is excluded from scoring rather than treated as a failure.
  const reqFail = results.some(r => r.required && !r.noData && !r.passed);

  // Build a human-readable reason from the top-weighted failing required criteria
  let failReason = null;
  if (reqFail) {
    const failing = results
      .filter(r => r.required && !r.noData && !r.passed)
      .sort((a, b) => b.weight - a.weight);
    const label = r => r.failLabel || r.label;
    if (failing.length === 1) {
      failReason = label(failing[0]);
    } else {
      // Show top two reasons, second in lowercase
      failReason = label(failing[0]) + " · " + label(failing[1]).toLowerCase();
    }
  }

  let total = 0;
  if (!reqFail) {
    const scorable = results.filter(r => !r.noData);
    const tw = scorable.reduce((s, r) => s + r.weight, 0);
    total = tw > 0 ? (scorable.reduce((s, r) => s + r.weighted, 0) / tw) * 100 : 0;
  }
  total = Math.round(total * 10) / 10;
  return {
    criteria: results, total, reqFail, failReason,
    grade: reqFail ? "FAIL" : total >= profile.scoring.highlight ? "EXCEPTIONAL" : total >= profile.scoring.pass ? "GOOD" : "MARGINAL",
  };
}

// ── NWS API Fetching ─────────────────────────────────────────────────────────
// Two-step: /points → get grid, then /gridpoints for raw data.
// Corn Harvest coords are placed in the actual ski zone (~7,000–9,000 ft) for
// accurate freeze-thaw scoring rather than at trailheads or extreme summits.

async function fetchNWS(url) {
  const res = await fetch(url, {
    headers: { "User-Agent": "AdventureScout/1.0 (adventure-scout-app)", "Accept": "application/geo+json" },
    cache: "no-store",   // never serve stale NWS data from browser cache
  });
  if (!res.ok) throw new Error(`NWS ${res.status} for ${url}`);
  return res.json();
}

async function getGridInfo(lat, lon) {
  const data = await fetchNWS(`https://api.weather.gov/points/${lat},${lon}`);
  const p = data.properties;
  return {
    gridId: p.gridId, gridX: p.gridX, gridY: p.gridY,
    forecastUrl: p.forecast, hourlyUrl: p.forecastHourly,
  };
}

// Convert ISO 8601 duration (e.g. PT6H) to hours
function parseDurationHours(dur) {
  const m = dur.match(/PT?(\d+)H/);
  return m ? parseInt(m[1]) : 1;
}

// Parse NWS gridpoint time series into daily values
function parseGridTimeSeries(values, aggregation = "avg") {
  if (!values || !values.length) return {};
  const byDate = {};
  for (const entry of values) {
    const [timeStr] = entry.validTime.split("/");
    const date = timeStr.slice(0, 10);
    if (!byDate[date]) byDate[date] = [];
    byDate[date].push(entry.value);
  }
  const result = {};
  for (const [date, vals] of Object.entries(byDate)) {
    const clean = vals.filter(v => v != null);
    if (!clean.length) continue;
    if (aggregation === "avg") result[date] = clean.reduce((a, b) => a + b, 0) / clean.length;
    else if (aggregation === "max") result[date] = Math.max(...clean);
    else if (aggregation === "min") result[date] = Math.min(...clean);
    else if (aggregation === "sum") result[date] = clean.reduce((a, b) => a + b, 0);
  }
  return result;
}

function celsiusToF(c) { return c != null ? c * 9 / 5 + 32 : null; }
function mmToInches(mm) { return mm != null ? mm / 25.4 : null; }
function mphFromKmh(kmh) { return kmh != null ? kmh * 0.621371 : null; }
function metersToMiles(m) { return m != null ? m / 1609.34 : null; }

// ── Moon light pollution for night photography ───────────────────────────────
// Returns a 0–100 score of how much moonlight pollutes the astronomical night,
// weighted by *when* within the night the pollution falls.
//   0  = new moon, or moon fully below horizon, during any prime hours
//   100 = full moon above the horizon through the whole astronomical night
//
// Time-of-night convenience weighting (bathtub curve):
//   w(p) = 0.4 + 0.6 * (1 - sin(π*p))   where p ∈ [0,1] is fraction of the night
// This makes samples right after nightfall (p≈0) and just before sunrise (p≈1)
// count 2.5× more than samples in the deep middle of the night (p≈0.5).
// Rationale: a dark, moon-free window right after nightfall or close to sunrise
// is more valuable than the same window at 1:30am when you'd be asleep. So a
// full moon that dominates 10pm–1am hurts the score more than a full moon that
// dominates 1am–3am.
//
// Uses SunCalc: samples moon position every 15 min through the astronomical
// dark window (sun 18° below horizon), summing illum × above-horizon × w(p).
function computeMoonLightPollution(dateStr, lat, lon) {
  if (typeof SunCalc === "undefined") return null;
  const [y, m, d] = dateStr.split("-").map(Number);
  // Anchor at local noon of the target date (timezone-safe via longitude offset)
  const utcNoonHour = 12 - lon / 15;
  const todayNoon = new Date(Date.UTC(y, m - 1, d, utcNoonHour, 0, 0));
  const tomorrowNoon = new Date(todayNoon.getTime() + 24 * 3600 * 1000);

  const todayTimes = SunCalc.getTimes(todayNoon, lat, lon);
  const tomorrowTimes = SunCalc.getTimes(tomorrowNoon, lat, lon);

  // Astronomical night: tonight's "night" start → tomorrow's "nightEnd"
  let nightStart = todayTimes.night;
  let nightEnd = tomorrowTimes.nightEnd;
  // Fallback to nautical twilight at high latitudes where astro night is absent
  if (!nightStart || isNaN(nightStart.getTime())) nightStart = todayTimes.nauticalDusk;
  if (!nightEnd   || isNaN(nightEnd.getTime()))   nightEnd   = tomorrowTimes.nauticalDawn;
  if (!nightStart || !nightEnd || nightEnd <= nightStart) return null;

  const startMs = nightStart.getTime();
  const durMs = nightEnd.getTime() - startMs;
  const stepMs = 15 * 60 * 1000;

  let pollutionSum = 0, weightSum = 0;
  for (let t = startMs; t < startMs + durMs; t += stepMs) {
    const when = new Date(t);
    const p = (t - startMs) / durMs;                     // 0 at dusk, 1 at dawn
    const w = 0.4 + 0.6 * (1 - Math.sin(Math.PI * p));    // bathtub: 1.0→0.4→1.0
    let sample = 0;
    const pos = SunCalc.getMoonPosition(when, lat, lon);
    if (pos.altitude > 0) {
      const illum = SunCalc.getMoonIllumination(when);
      sample = illum.fraction;                            // 0 new → 1 full
    }
    pollutionSum += sample * w;
    weightSum += w;
  }
  if (weightSum === 0) return null;
  return Math.round((pollutionSum / weightSum) * 100);
}

async function fetchNWSWeather(lat, lon) {
  // Step 1: Grid lookup
  const grid = await getGridInfo(lat, lon);
  console.log(`[NWS] (${lat},${lon}) → grid ${grid.gridId}/${grid.gridX},${grid.gridY}`);

  // Step 2: Fetch raw gridpoint data
  const gridData = await fetchNWS(
    `https://api.weather.gov/gridpoints/${grid.gridId}/${grid.gridX},${grid.gridY}`
  );
  const gp = gridData.properties;

  // Log which fields NWS actually provided
  const nwsFields = {
    maxTemperature: !!gp.maxTemperature?.values?.length,
    minTemperature: !!gp.minTemperature?.values?.length,
    skyCover:       !!gp.skyCover?.values?.length,
    windSpeed:      !!gp.windSpeed?.values?.length,
    windGust:       !!gp.windGust?.values?.length,
    snowfallAmount: !!gp.snowfallAmount?.values?.length,
    relativeHumidity: !!gp.relativeHumidity?.values?.length,
    quantitativePrecipitation: !!gp.quantitativePrecipitation?.values?.length,
    visibility:     !!gp.visibility?.values?.length,
    probabilityOfPrecipitation: !!gp.probabilityOfPrecipitation?.values?.length,
  };
  console.log(`[NWS] (${lat},${lon}) fields:`, nwsFields);

  // Parse grid data into daily values
  const tempMax   = parseGridTimeSeries(gp.maxTemperature?.values             || [], "max");
  const tempMin   = parseGridTimeSeries(gp.minTemperature?.values             || [], "min");
  const skyCover  = parseGridTimeSeries(gp.skyCover?.values                   || [], "avg");
  const windSpeed = parseGridTimeSeries(gp.windSpeed?.values                  || [], "avg");
  const windGust  = parseGridTimeSeries(gp.windGust?.values                   || [], "max");
  const snowfall  = parseGridTimeSeries(gp.snowfallAmount?.values             || [], "sum");
  const humidity  = parseGridTimeSeries(gp.relativeHumidity?.values           || [], "avg");
  const precipAmt = parseGridTimeSeries(gp.quantitativePrecipitation?.values  || [], "sum");
  const visibility= parseGridTimeSeries(gp.visibility?.values                 || [], "avg");
  const probPrecip= parseGridTimeSeries(gp.probabilityOfPrecipitation?.values || [], "max");

  const allDates = new Set([
    ...Object.keys(tempMax), ...Object.keys(tempMin), ...Object.keys(skyCover)
  ]);
  const today = new Date().toISOString().slice(0, 10);
  const dates = [...allDates].filter(d => d >= today).sort().slice(0, 7);

  if (dates.length === 0) throw new Error("NWS returned no usable dates");

  const weatherByDay = {};
  for (const date of dates) {
    const hi = tempMax[date];
    const lo = tempMin[date];
    // If NWS can't give us temperature at all for this grid cell, bail out so
    // Open-Meteo fallback can provide accurate elevation-adjusted data.
    if (hi == null && lo == null) continue;
    weatherByDay[date] = {
      // temperature_f = daily HIGH — used for "warm enough to soften" criterion.
      // Using the average would mix in the overnight freeze and make the soften
      // check fail even on days that genuinely warm up during the scoring window.
      temperature_f:                 celsiusToF(hi ?? lo),
      cloud_cover_pct:               skyCover[date]          ?? null,
      wind_speed_mph:                mphFromKmh(windSpeed[date]),
      wind_gust_mph:                 mphFromKmh(windGust[date]),
      overnight_snowfall_in:         mmToInches(snowfall[date]),
      overnight_low_f:               celsiusToF(lo),
      humidity_pct:                  humidity[date]          ?? null,
      precipitation_in:              mmToInches(precipAmt[date]),
      visibility_mi:                 metersToMiles(visibility[date]),
      precipitation_probability_pct: probPrecip[date]        ?? null,
    };
  }

  if (Object.keys(weatherByDay).length === 0) throw new Error("NWS grid has no temperature data");
  console.log(`[NWS] (${lat},${lon}) OK — ${Object.keys(weatherByDay).length} days`);
  return { weatherByDay, forecastUrl: grid.forecastUrl, source: "NWS" };
}

async function fetchOpenMeteoWeather(lat, lon) {
  // Open-Meteo: global coverage, no grid-cell gaps. Used as fallback when NWS
  // returns 404 or empty temperature data for remote high-elevation grid cells.
  const vars = [
    "temperature_2m_max","temperature_2m_min",
    "precipitation_sum","precipitation_probability_max",
    "cloud_cover_mean","wind_speed_10m_max","wind_gusts_10m_max",
    "snowfall_sum","relative_humidity_2m_max","visibility_mean",
  ].join(",");
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&daily=${vars}&timezone=America%2FLos_Angeles&forecast_days=7` +
    `&wind_speed_unit=mph&temperature_unit=fahrenheit`;

  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error(`Open-Meteo ${res.status}`);
  const data = await res.json();
  const d = data.daily;

  const today = new Date().toISOString().slice(0, 10);
  const weatherByDay = {};
  for (let i = 0; i < d.time.length; i++) {
    const date = d.time[i];
    if (date < today) continue;
    const hi = d.temperature_2m_max[i];
    const lo = d.temperature_2m_min[i];
    // Open-Meteo snowfall is in cm — convert to inches
    const snowCm = d.snowfall_sum?.[i];
    // visibility_mean is in metres if available
    const visMi = d.visibility_mean?.[i] != null ? d.visibility_mean[i] / 1609.34 : null;
    weatherByDay[date] = {
      temperature_f:                 hi ?? lo,  // daily HIGH — see NWS note above
      overnight_low_f:               lo,
      cloud_cover_pct:               d.cloud_cover_mean?.[i]              ?? null,
      wind_speed_mph:                d.wind_speed_10m_max?.[i]            ?? null,
      wind_gust_mph:                 d.wind_gusts_10m_max?.[i]            ?? null,
      overnight_snowfall_in:         snowCm != null ? snowCm / 2.54 : null,
      precipitation_in:              d.precipitation_sum?.[i]             ?? null,
      precipitation_probability_pct: d.precipitation_probability_max?.[i] ?? null,
      humidity_pct:                  d.relative_humidity_2m_max?.[i]      ?? null,
      visibility_mi:                 visMi,
    };
  }

  const forecastUrl = `https://forecast.weather.gov/MapClick.php?lat=${lat}&lon=${lon}`;
  console.log(`[Open-Meteo] (${lat},${lon}) OK — ${Object.keys(weatherByDay).length} days`);
  return { weatherByDay, forecastUrl, source: "Open-Meteo" };
}

async function fetchLocationWeather(lat, lon) {
  let result;
  try {
    result = await fetchNWSWeather(lat, lon);
  } catch (nwsErr) {
    console.warn(`[NWS] (${lat},${lon}) failed: ${nwsErr.message} — trying Open-Meteo fallback`);
    result = await fetchOpenMeteoWeather(lat, lon);
  }
  enrichWithMoon(result, lat, lon);
  return result;
}

// Moon enrichment is done client-side (not in the background Python fetcher)
// so the astronomy math stays in one place with the SunCalc library.
function enrichWithMoon(weatherResult, lat, lon) {
  for (const date of Object.keys(weatherResult.weatherByDay)) {
    weatherResult.weatherByDay[date].moon_light_pct =
      computeMoonLightPollution(date, lat, lon);
  }
}

// ── Cached conditions loader ─────────────────────────────────────────────────
// The background GitHub Action writes data/conditions.json hourly. Loading it
// gives instant results on page view; force-refresh bypasses it.
async function hydrateFromCache() {
  try {
    const res = await fetch(`./data/conditions.json?t=${Date.now()}`, { cache: "no-store" });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.weatherCache || Object.keys(data.weatherCache).length === 0) return null;
    // Apply moon enrichment to each cached location
    for (const [key, wx] of Object.entries(data.weatherCache)) {
      const [lat, lon] = key.split(",").map(Number);
      enrichWithMoon(wx, lat, lon);
    }
    return data;   // { lastUpdated, weatherCache, errors }
  } catch (e) {
    console.warn("[cache] hydrate failed:", e);
    return null;
  }
}

function formatTimeAgo(isoString) {
  if (!isoString) return "never";
  const then = new Date(isoString).getTime();
  const diffSec = Math.round((Date.now() - then) / 1000);
  if (diffSec < 30) return "just now";
  if (diffSec < 60) return `${diffSec}s ago`;
  const diffMin = Math.round(diffSec / 60);
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.round(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h ago`;
  return new Date(isoString).toLocaleString();
}

// ── Rendering ────────────────────────────────────────────────────────────────

function ringSVG(score, grade, size = 62) {
  const r = (size - 8) / 2, circ = 2 * Math.PI * r;
  const offset = circ - (Math.max(0, score) / 100) * circ;
  const colors = { EXCEPTIONAL: "#f0b429", GOOD: "#38b764", MARGINAL: "#e8a838", FAIL: "#e85d4a" };
  const c = colors[grade] || colors.FAIL;
  return `<svg width="${size}" height="${size}" class="ring">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="5"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .8s ease-out"/>
    <text x="${size/2}" y="${size/2+1}" text-anchor="middle" dominant-baseline="central"
      font-size="${size>50?'16':'12'}" font-weight="700" font-family="'JetBrains Mono',monospace">
      ${score > 0 ? Math.round(score) : "—"}</text>
  </svg>`;
}

function renderCriteria(criteria) {
  return criteria.map(c => {
    const pct = Math.round((c.rawScore || 0) * 100);
    const color = c.noData ? "#444" : !c.passed && c.required ? "#e85d4a" : !c.passed ? "#e8a838" : pct >= 80 ? "#38b764" : "#4da8da";
    const fmt = v => v == null ? "—" : Number.isInteger(v) ? v : v.toFixed(1);
    const reqColor = c.noData ? "#555" : c.required ? (c.passed ? "#38b764" : "#e85d4a") : "#444";
    const reqChar = c.noData ? "?" : c.required ? (c.passed ? "✓" : "✗") : "·";
    return `<div class="crit-row">
      <div class="crit-label">${c.label}</div>
      <div class="crit-bar-bg"><div class="crit-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="crit-val">${fmt(c.actual)}</div>
      <div class="crit-req" style="color:${reqColor}">${reqChar}</div>
    </div>`;
  }).join("");
}

function renderLocationCard(loc, result, rank, accent) {
  const colors = { EXCEPTIONAL: "#f0b429", GOOD: "#38b764", MARGINAL: "#e8a838", FAIL: "#e85d4a" };
  const gc = colors[result.grade] || colors.FAIL;
  const isTop = rank <= 3;
  const id = `loc-${loc.name.replace(/\s/g, "-")}-${rank}`;
  const nwsUrl = `https://forecast.weather.gov/MapClick.php?lat=${loc.lat}&lon=${loc.lon}`;
  const omUrl  = `https://open-meteo.com/en/docs#latitude=${loc.lat}&longitude=${loc.lon}&hourly=temperature_2m,precipitation,cloud_cover,wind_speed_10m,snowfall,precipitation_probability`;

  const bgStyle = isTop ? `background:${gc}18` : "";
  const borderStyle = isTop ? `border-color:${gc}33` : "";
  const links = isTop ? `<div class="loc-links">
    <a href="${nwsUrl}" target="_blank" style="color:${accent};border-color:${accent}44" onclick="event.stopPropagation()">NWS ↗</a>
    <a href="${omUrl}" target="_blank" style="color:#8bc34a;border-color:rgba(139,195,74,0.25)" onclick="event.stopPropagation()">Forecast ↗</a>
  </div>` : "";

  return `<div class="loc ${isTop ? 'top' : ''}" style="${bgStyle};${borderStyle}" onclick="toggleCriteria('${id}')">
    <div class="loc-row">
      <div class="loc-rank" style="color:${isTop ? gc : '#444'}">${isTop ? '#'+rank : rank}</div>
      ${ringSVG(result.total, result.grade, 44)}
      <div class="loc-info">
        <div class="loc-name">${loc.name}</div>
        <div class="loc-meta">${result.bestDate} · ${result.failReason ? `<span style="color:#e85d4a">${result.failReason}</span>` : result.grade}${loc.elevation ? ' · '+loc.elevation.toLocaleString()+'ft' : ''}${result.source === 'Open-Meteo' ? ' · <span style="color:#8bc34a">OM</span>' : ''}</div>
      </div>
      ${links}
      <div class="loc-expand" id="${id}-arrow">▾</div>
    </div>
    <div class="criteria" id="${id}">${renderCriteria(result.criteria)}</div>
  </div>`;
}

// ── Scoring criteria popover ─────────────────────────────────────────────────
function fieldUnit(field) {
  if (field.endsWith("_f"))   return "°F";
  if (field.endsWith("_pct")) return "%";
  if (field.endsWith("_mph")) return " mph";
  if (field.endsWith("_in"))  return "\"";
  if (field.endsWith("_mi"))  return " mi";
  return "";
}

function renderScoringPopover(profile) {
  const id = `si-${profile.name.replace(/\W/g, "")}`;
  const rows = profile.criteria.map(c => {
    const u = fieldUnit(c.field);
    const thresh = c.op === "between"
      ? `${c.threshold}–${c.upper}${u}`
      : `${c.op === "<=" ? "≤" : "≥"}${c.threshold}${u}`;
    const idealStr = c.ideal != null ? ` · ideal ${c.ideal}${u}` : "";
    const dot = c.required
      ? `<span style="color:#e85d4a">●</span>`
      : `<span style="color:var(--t3)">○</span>`;
    const reqTag = c.required
      ? `<span style="color:#e85d4a;font-size:9px;letter-spacing:.5px"> REQUIRED</span>`
      : "";
    return `<div class="si-row">
      <div class="si-dot">${dot}</div>
      <div class="si-info">
        <div class="si-label">${c.label}${reqTag}</div>
        ${c.rationale ? `<div class="si-rationale">${c.rationale}</div>` : ""}
        <div class="si-meta">${thresh}${idealStr} · weight ${c.weight}%</div>
      </div>
    </div>`;
  }).join("");

  return `<div class="si-wrap" id="${id}">
    <button class="si-btn" onclick="toggleScoringInfo(event,'${id}')">How is this scored? ℹ</button>
    <div class="si-pop" onclick="event.stopPropagation()">
      <div class="si-head">SCORING CRITERIA</div>
      ${rows}
      <div class="si-divider"></div>
      <div class="si-footer">● required &nbsp;○ optional &nbsp;·&nbsp; Pass ≥${profile.scoring.pass} &nbsp;·&nbsp; Exceptional ≥${profile.scoring.highlight}</div>
    </div>
  </div>`;
}

function toggleScoringInfo(event, id) {
  event.stopPropagation();
  const el = document.getElementById(id);
  const isOpen = el.classList.contains("open");
  document.querySelectorAll(".si-wrap.open").forEach(e => e.classList.remove("open"));
  if (!isOpen) el.classList.add("open");
}
document.addEventListener("click", () => {
  document.querySelectorAll(".si-wrap.open").forEach(e => e.classList.remove("open"));
});

// ── Day detail modal ─────────────────────────────────────────────────────────
// Cell results are stored here by ID during renderProfileTable so onclick can
// look them up without embedding JSON in HTML attributes.
const _cellData = {};


function showDayModal(cellId) {
  const { locName, date, result } = _cellData[cellId];
  const colors = { EXCEPTIONAL: "#f0b429", GOOD: "#38b764", MARGINAL: "#e8a838", FAIL: "#e85d4a" };
  const gc = colors[result.grade] || colors.FAIL;
  const metaHtml = result.failReason
    ? `<span style="color:#e85d4a">${result.failReason}</span>`
    : `<span style="color:${gc}">${result.grade} · ${Math.round(result.total)}</span>`;
  const dt = new Date(date + "T12:00:00");
  const dateStr = dt.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
  document.getElementById("modalArea").innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeDayModal()">
      <div class="modal-box">
        <div class="modal-head">
          ${ringSVG(result.total, result.grade, 44)}
          <div class="modal-info">
            <div class="modal-loc">${locName}</div>
            <div class="modal-date">${dateStr} · ${metaHtml}</div>
          </div>
          <button class="modal-close" onclick="closeDayModal()">×</button>
        </div>
        ${renderCriteria(result.criteria)}
      </div>
    </div>`;
}

function closeDayModal() {
  document.getElementById("modalArea").innerHTML = "";
}

// Close modal on Escape key
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDayModal(); });

// ── Table renderer (used when profile.tableView === true) ─────────────────────
function renderProfileTable(profile, locResults) {
  const today = new Date().toISOString().slice(0, 10);

  // Collect the first 5 future dates that appear in any location's data
  const dateSet = new Set();
  for (const r of locResults) {
    for (const d of Object.keys(r.dailyResults)) {
      if (d >= today) dateSet.add(d);
    }
  }
  const dates = [...dateSet].sort().slice(0, 6);

  // Sort rows: location whose best single day scores highest goes first
  const sorted = [...locResults].sort((a, b) => {
    const bestA = Math.max(0, ...Object.values(a.dailyResults).map(r => r.total));
    const bestB = Math.max(0, ...Object.values(b.dailyResults).map(r => r.total));
    return bestB - bestA;
  });

  // Best score across all locations and days (for the header ring)
  let overallBest = null;
  for (const r of locResults) {
    for (const res of Object.values(r.dailyResults)) {
      if (!overallBest || res.total > overallBest.total) overallBest = res;
    }
  }

  // Day column headers
  const dayHeads = dates.map(d => {
    const dt = new Date(d + "T12:00:00");
    const wd = dt.toLocaleDateString("en-US", { weekday: "short" }).toUpperCase();
    const md = dt.toLocaleDateString("en-US", { month: "numeric", day: "numeric" });
    return `<th class="ct-day-head">${wd}<br>${md}</th>`;
  }).join("");

  // Data rows
  const rows = sorted.map(r => {
    const cells = dates.map(date => {
      const res = r.dailyResults[date];
      if (!res) return `<td class="ct-score-cell"><div class="ct-pill grade-NONE">—</div></td>`;

      // Label: score number for passing grades, short fail reason for FAIL
      let label;
      if (res.grade === "FAIL") {
        const reason = res.failReason || "";
        // First segment before " · ", then truncate to 2 words
        label = reason.split(" · ")[0].split(" ").slice(0, 2).join(" ") || "—";
      } else {
        label = Math.round(res.total).toString();
      }

      const cellId = `c-${r.location.name.replace(/[^a-z0-9]/gi, "")}-${date}`;
      _cellData[cellId] = { locName: r.location.name, date, result: res };

      return `<td class="ct-score-cell">
        <div class="ct-pill grade-${res.grade}" onclick="showDayModal('${cellId}')">${label}</div>
      </td>`;
    }).join("");

    const loc = r.location;
    return `<tr>
      <td class="ct-loc-cell" title="${loc.name}"><span class="ct-loc-name">${loc.name}</span></td>
      ${cells}
    </tr>`;
  }).join("");

  const hasAlerts = locResults.some(r =>
    Object.values(r.dailyResults).some(res => res.grade === "GOOD" || res.grade === "EXCEPTIONAL")
  );

  return `<div class="profile fade-up ${hasAlerts ? "has-alerts" : ""}" style="--profile-accent:${profile.accent}">
    <div class="profile-header">
      <div class="profile-emoji">${profile.emoji}</div>
      <div class="profile-info">
        <h2>${profile.name}</h2>
        <p>${profile.description}</p>
      </div>
      <div class="profile-best">
        ${overallBest ? ringSVG(overallBest.total, overallBest.grade, 62) : ""}
        ${overallBest ? '<div class="label">BEST</div>' : ""}
        ${renderScoringPopover(profile)}
      </div>
    </div>
    <div class="ct-wrap">
      <table class="ct">
        <thead><tr><th class="ct-loc-head">LOCATION</th>${dayHeads}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ── Profile renderer — dispatches to table or card view ──────────────────────
function renderProfile(profile, locResults) {
  if (profile.tableView) return renderProfileTable(profile, locResults);

  const sorted = [...locResults].sort((a, b) => b.result.total - a.result.total);
  const best = sorted[0];
  const hasAlerts = sorted.some(r => r.result.grade === "GOOD" || r.result.grade === "EXCEPTIONAL");

  const cardsHtml = sorted.map((r, i) =>
    renderLocationCard(r.location, r.result, i + 1, profile.accent)
  ).join("");

  return `<div class="profile fade-up ${hasAlerts ? "has-alerts" : ""}" style="--profile-accent:${profile.accent}">
    <div class="profile-header">
      <div class="profile-emoji">${profile.emoji}</div>
      <div class="profile-info">
        <h2>${profile.name}</h2>
        <p>${profile.description}</p>
      </div>
      <div class="profile-best">
        ${best ? ringSVG(best.result.total, best.result.grade, 62) : ""}
        ${best ? '<div class="label">BEST</div>' : ""}
        ${renderScoringPopover(profile)}
      </div>
    </div>
    ${cardsHtml}
  </div>`;
}

function toggleCriteria(id) {
  const el = document.getElementById(id);
  const arrow = document.getElementById(id + "-arrow");
  if (el) { el.classList.toggle("open"); }
  if (arrow) { arrow.classList.toggle("open"); }
}

// ── Orchestrator ─────────────────────────────────────────────────────────────

let isRunning = false;
let lastUpdatedIso = null;   // timestamp of the data currently displayed

// Render the results area from an already-populated weatherCache.
function renderAll(weatherCache) {
  const resultsArea = document.getElementById("resultsArea");
  const footerEl = document.getElementById("footerEl");
  const allHtml = [];
  for (const profile of PROFILES) {
    const locResults = [];
    for (const loc of profile.locations) {
      const cached = weatherCache[`${loc.lat},${loc.lon}`];
      if (!cached) continue;
      const dailyResults = {};
      let bestResult = null, bestDate = null;
      for (const [date, weather] of Object.entries(cached.weatherByDay)) {
        const result = scoreLocation(profile, weather);
        dailyResults[date] = result;
        if (!bestResult || result.total > bestResult.total) {
          bestResult = result;
          bestDate = date;
        }
      }
      if (bestResult) {
        locResults.push({ location: loc, dailyResults, result: { ...bestResult, bestDate, source: cached.source } });
      }
    }
    allHtml.push(renderProfile(profile, locResults));
  }
  resultsArea.innerHTML = allHtml.join("");
  footerEl.style.display = "block";
}

function setButtonState(state) {
  const btn = document.getElementById("refreshBtn");
  if (state === "loading") {
    btn.disabled = true;
    btn.innerHTML = '<span class="spin">↻</span> Refreshing…';
  } else {
    btn.disabled = false;
    btn.innerHTML = "↻ Force refresh";
  }
}

function updateTimestamp() {
  document.getElementById("lastRun").textContent = lastUpdatedIso
    ? `Updated ${formatTimeAgo(lastUpdatedIso)}`
    : "";
}
// Refresh the "Xm ago" label every 30s without touching the data
setInterval(updateTimestamp, 30 * 1000);

// Force refresh: live fetch for every unique location, in parallel,
// no 5-second gap — user is waiting, speed is the priority.
async function runScout({ force = false } = {}) {
  if (isRunning) return;
  isRunning = true;

  const statusArea = document.getElementById("statusArea");
  const resultsArea = document.getElementById("resultsArea");

  // First load: try the scheduled snapshot. Instant render, no NWS calls.
  if (!force) {
    const cached = await hydrateFromCache();
    if (cached) {
      renderAll(cached.weatherCache);
      lastUpdatedIso = cached.lastUpdated;
      updateTimestamp();
      setButtonState("idle");
      isRunning = false;
      return;
    }
    // No cache yet (first deploy) — fall through to a live fetch
    console.info("[cache] empty, falling back to live fetch");
  }

  setButtonState("loading");

  // Only show the full-page status if we have no existing results to keep visible
  const hasExistingResults = resultsArea.childElementCount > 0;
  if (!hasExistingResults) {
    const locCount = new Set(PROFILES.flatMap(p => p.locations.map(l => `${l.lat},${l.lon}`))).size;
    statusArea.innerHTML = `<div class="status-box"><div class="icon pulse">📡</div>
      <div class="msg">Fetching forecasts (NWS → Open-Meteo fallback)...</div>
      <div class="sub">0 / ${locCount} locations</div></div>`;
  }

  // Deduplicate locations across profiles
  const locMap = new Map();
  for (const p of PROFILES) {
    for (const l of p.locations) {
      const key = `${l.lat},${l.lon}`;
      if (!locMap.has(key)) locMap.set(key, l);
    }
  }
  const uniqueLocs = [...locMap.values()];

  // Parallel fetches — no 5-second gap; force refresh prioritizes speed.
  const results = await Promise.allSettled(
    uniqueLocs.map(loc => fetchLocationWeather(loc.lat, loc.lon))
  );

  const weatherCache = {};
  const errors = [];
  results.forEach((r, i) => {
    const loc = uniqueLocs[i];
    if (r.status === "fulfilled") {
      weatherCache[`${loc.lat},${loc.lon}`] = r.value;
    } else {
      errors.push({ name: loc.name, error: r.reason?.message || String(r.reason) });
    }
  });

  if (Object.keys(weatherCache).length === 0) {
    statusArea.innerHTML = `<div class="error-box">
      <h3>Failed to fetch weather data</h3>
      <p>${errors.map(e => `${e.name}: ${e.error}`).join("<br>")}</p>
      <button onclick="runScout({force:true})">Try again</button>
    </div>`;
    setButtonState("idle");
    isRunning = false;
    return;
  }

  statusArea.innerHTML = "";
  renderAll(weatherCache);

  if (errors.length > 0) {
    const warnHtml = `<div style="padding:10px;background:rgba(232,168,56,0.08);border-radius:8px;border:1px solid rgba(232,168,56,0.2);margin-bottom:12px;font-size:11px;color:var(--t2)">
      ⚠ Some locations failed: ${errors.map(e => e.name).join(", ")}
    </div>`;
    resultsArea.innerHTML = warnHtml + resultsArea.innerHTML;
  }

  lastUpdatedIso = new Date().toISOString();
  updateTimestamp();
  setButtonState("idle");
  isRunning = false;
}

// Auto-run on load
// On page load, try the cached hourly snapshot first (instant).
// If it's missing/empty (first deploy), runScout falls through to a live fetch.
runScout({ force: false });
</script>
