name: Update conditions

on:
  # Hourly on the hour. GitHub may drift this by a few minutes under load.
  schedule:
    - cron: "0 * * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Prevent two scheduled runs overlapping if one is slow
concurrency:
  group: update-conditions
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Script uses only stdlib — no pip install needed.

      - name: Fetch conditions
        run: python scripts/fetch_conditions.py

      - name: Commit updated conditions.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/conditions.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update conditions [skip ci]"
            git push
          fi
